[pytest]
asyncio_mode = auto

# Ensure backend modules/tests resolve the same whether pytest is run from
# repo root or from the backend directory.
pythonpath =
    backend

# Constrain test discovery to repository-owned suites so invoking pytest
# from a different cwd does not recurse into user profile directories.
testpaths =
    backend/tests
    tests
    backend_test.py

# These directories are generated by some local tooling and can end up with
# Windows ACLs that break pytest collection.
norecursedirs =
    pytest-cache-files-*
    .pytest_temp
    .tmp
    .git
    .venv
    venv
    node_modules
    dist
    build
    __pycache__

# Avoid writing to .pytest_cache in locked-down environments.
# Exclude the script-style E2E delegate from normal pytest collection.
addopts = -p no:cacheprovider --ignore=test_e2e_workflow.py

# Keep test output actionable by filtering known third-party deprecations
# on Python 3.14+ (does not change runtime behavior).
filterwarnings =
    ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning
    ignore:'asyncio\.iscoroutinefunction' is deprecated and slated for removal in Python 3\.16; use inspect\.iscoroutinefunction\(\) instead:DeprecationWarning

