name: Deploy Backend VM

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Backend image tag to deploy, for example sha-<full-commit-sha>.
        required: true
        type: string
      tunnel_through_iap:
        description: Route VM access through IAP.
        required: false
        default: true
        type: boolean

concurrency:
  group: deploy-backend-vm-production
  cancel-in-progress: false

env:
  GAR_LOCATION: ${{ vars['GAR_LOCATION'] || 'us-central1' }}
  GAR_REPOSITORY: ${{ vars['GAR_REPOSITORY'] || 'iems' }}
  BACKEND_IMAGE_NAME: ${{ vars['BACKEND_IMAGE_NAME'] || 'myiems-backend' }}
  GCP_PROJECT_ID: ${{ vars['GCP_PROJECT_ID'] }}
  GCE_ZONE: ${{ vars['GCE_ZONE'] || 'us-central1-a' }}
  GCE_INSTANCE_NAME: ${{ vars['GCE_INSTANCE_NAME'] || 'iems-app-vm' }}
  GCE_SSH_USER: ${{ vars['GCE_SSH_USER'] || 'kenne' }}
  GCE_REPO_ROOT_ON_VM: ${{ vars['GCE_REPO_ROOT_ON_VM'] || '/home/kenne/MyIEMS' }}
  BACKEND_DEPLOY_COMPOSE_FILE: ${{ vars['BACKEND_DEPLOY_COMPOSE_FILE'] || 'deploy/gcp/docker-compose.vm.yml' }}
  BACKEND_DEPLOY_ENV_FILE: ${{ vars['BACKEND_DEPLOY_ENV_FILE'] || 'deploy/gcp/.env' }}
  BACKEND_HEALTH_URL: ${{ vars['BACKEND_HEALTH_URL'] || '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars['BACKEND_HEALTH_URL'] || '' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate deploy configuration
        shell: bash
        run: |
          test -n "${GCP_PROJECT_ID}" || { echo "Missing repository variable GCP_PROJECT_ID"; exit 1; }
          test -n "${GCE_ZONE}" || { echo "Missing repository variable GCE_ZONE"; exit 1; }
          test -n "${GCE_INSTANCE_NAME}" || { echo "Missing repository variable GCE_INSTANCE_NAME"; exit 1; }
          test -n "${GCE_SSH_USER}" || { echo "Missing repository variable GCE_SSH_USER"; exit 1; }
          test -n "${GCE_REPO_ROOT_ON_VM}" || { echo "Missing repository variable GCE_REPO_ROOT_ON_VM"; exit 1; }
          test -n "${BACKEND_DEPLOY_COMPOSE_FILE}" || { echo "Missing repository variable BACKEND_DEPLOY_COMPOSE_FILE"; exit 1; }
          test -n "${BACKEND_DEPLOY_ENV_FILE}" || { echo "Missing repository variable BACKEND_DEPLOY_ENV_FILE"; exit 1; }
          test -n "${{ secrets['GCP_WORKLOAD_IDENTITY_PROVIDER'] }}" || { echo "Missing repository secret GCP_WORKLOAD_IDENTITY_PROVIDER"; exit 1; }
          test -n "${{ secrets['GCP_SERVICE_ACCOUNT'] }}" || { echo "Missing repository secret GCP_SERVICE_ACCOUNT"; exit 1; }

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            test -n "${{ inputs.image_tag }}" || { echo "workflow_dispatch input image_tag is required"; exit 1; }
          fi

      - id: resolve_image_tag
        name: Resolve image tag
        shell: bash
        env:
          MANUAL_IMAGE_TAG: ${{ inputs.image_tag }}
          MANUAL_TUNNEL_THROUGH_IAP: ${{ inputs.tunnel_through_iap }}
        run: |
          set -euo pipefail

          IMAGE_TAG="${MANUAL_IMAGE_TAG}"
          TUNNEL_THROUGH_IAP="${MANUAL_TUNNEL_THROUGH_IAP}"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "tunnel_through_iap=${TUNNEL_THROUGH_IAP}" >> "$GITHUB_OUTPUT"

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          workload_identity_provider: ${{ secrets['GCP_WORKLOAD_IDENTITY_PROVIDER'] }}
          service_account: ${{ secrets['GCP_SERVICE_ACCOUNT'] }}
          create_credentials_file: true

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db

      - name: Upload backend deploy compose file to VM
        timeout-minutes: 10
        shell: bash
        env:
          TUNNEL_THROUGH_IAP: ${{ steps.resolve_image_tag.outputs.tunnel_through_iap }}
        run: |
          set -euo pipefail

          SSH_TARGET="${GCE_SSH_USER}@${GCE_INSTANCE_NAME}"
          SCP_ARGS=(compute scp "deploy/gcp/docker-compose.vm.yml" "${SSH_TARGET}:${GCE_REPO_ROOT_ON_VM}/deploy/gcp/docker-compose.vm.yml" "--project=${GCP_PROJECT_ID}" "--zone=${GCE_ZONE}")
          if [[ "${TUNNEL_THROUGH_IAP}" == "true" ]]; then
            SCP_ARGS+=(--tunnel-through-iap)
          fi
          gcloud --quiet "${SCP_ARGS[@]}"

      - name: Deploy selected backend image to VM
        timeout-minutes: 15
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.resolve_image_tag.outputs.image_tag }}
          TUNNEL_THROUGH_IAP: ${{ steps.resolve_image_tag.outputs.tunnel_through_iap }}
        run: |
          set -euo pipefail

          IMAGE_REF="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${BACKEND_IMAGE_NAME}:${IMAGE_TAG}"

          REMOTE_COMMAND="set -euo pipefail; cd '${GCE_REPO_ROOT_ON_VM}'; if [[ '${BACKEND_DEPLOY_ENV_FILE}' = /* ]]; then ENV_PATH='${BACKEND_DEPLOY_ENV_FILE}'; else ENV_PATH='${GCE_REPO_ROOT_ON_VM}/${BACKEND_DEPLOY_ENV_FILE}'; fi; mkdir -p \"\$(dirname \"\${ENV_PATH}\")\"; touch \"\${ENV_PATH}\"; sed -i '/^BACKEND_IMAGE=/d' \"\${ENV_PATH}\"; sed -i '/^ENVIRONMENT=/d' \"\${ENV_PATH}\"; sed -i '/^IEMS_SEED_ADMIN_PASSWORD=/d' \"\${ENV_PATH}\"; echo 'BACKEND_IMAGE=${IMAGE_REF}' >> \"\${ENV_PATH}\"; echo 'ENVIRONMENT=production' >> \"\${ENV_PATH}\"; compose() { if sudo docker compose version >/dev/null 2>&1; then sudo docker compose -f '${BACKEND_DEPLOY_COMPOSE_FILE}' \"\$@\"; else sudo docker-compose -f '${BACKEND_DEPLOY_COMPOSE_FILE}' \"\$@\"; fi; }; compose pull backend; compose up -d --force-recreate backend; compose ps"

          SSH_TARGET="${GCE_SSH_USER}@${GCE_INSTANCE_NAME}"
          SSH_ARGS=(compute ssh "${SSH_TARGET}" "--project=${GCP_PROJECT_ID}" "--zone=${GCE_ZONE}")

          if [[ "${TUNNEL_THROUGH_IAP}" == "true" ]]; then
            SSH_ARGS+=(--tunnel-through-iap)
          fi

          gcloud --quiet "${SSH_ARGS[@]}" --command "${REMOTE_COMMAND}"

      - name: Wait for backend database readiness on VM
        timeout-minutes: 10
        shell: bash
        env:
          TUNNEL_THROUGH_IAP: ${{ steps.resolve_image_tag.outputs.tunnel_through_iap }}
        run: |
          set -euo pipefail

          REMOTE_CMD="set -euo pipefail; cd '${GCE_REPO_ROOT_ON_VM}'"
          REMOTE_CMD="${REMOTE_CMD}; compose() { if sudo docker compose version >/dev/null 2>&1; then sudo docker compose -f '${BACKEND_DEPLOY_COMPOSE_FILE}' \"\$@\"; else sudo docker-compose -f '${BACKEND_DEPLOY_COMPOSE_FILE}' \"\$@\"; fi; }"
          REMOTE_CMD="${REMOTE_CMD}; READY=0"
          REMOTE_CMD="${REMOTE_CMD}; BACKEND_CTR=''"
          REMOTE_CMD="${REMOTE_CMD}; for cycle in 1 2; do for attempt in {1..24}; do BACKEND_CTR=\$(sudo docker ps --format '{{.Names}}' | grep -i backend | grep -v pause | head -1 || true); if [[ -n \"\${BACKEND_CTR}\" ]]; then READY_PAYLOAD=\$(sudo docker exec \"\${BACKEND_CTR}\" curl -sS http://127.0.0.1:8000/health/ready || true); if echo \"\${READY_PAYLOAD}\" | grep -Eq '\"status\"\s*:\s*\"ready\"'; then READY=1; break; fi; echo \"Backend readiness check \${attempt}/24: \${READY_PAYLOAD:-no response}\"; else echo \"Backend container not found for readiness check (\${attempt}/24).\"; fi; sleep 5; done; if [[ \"\${READY}\" == '1' ]]; then break; fi; if [[ \"\${cycle}\" == '1' ]]; then echo 'Backend stayed degraded after rollout; recreating backend once more.'; compose up -d --force-recreate backend; fi; done"
          REMOTE_CMD="${REMOTE_CMD}; [[ \"\${READY}\" == '1' ]] || { echo 'Backend never reached database-ready state.'; [[ -n \"\${BACKEND_CTR}\" ]] && sudo docker logs --tail 100 \"\${BACKEND_CTR}\"; exit 1; }"

          SSH_TARGET="${GCE_SSH_USER}@${GCE_INSTANCE_NAME}"
          SSH_ARGS=(compute ssh "${SSH_TARGET}" "--project=${GCP_PROJECT_ID}" "--zone=${GCE_ZONE}")
          if [[ "${TUNNEL_THROUGH_IAP}" == "true" ]]; then
            SSH_ARGS+=(--tunnel-through-iap)
          fi

          gcloud --quiet "${SSH_ARGS[@]}" --command "${REMOTE_CMD}"

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "## Backend deployment"
            echo
            echo "- Image tag: ${{ steps.resolve_image_tag.outputs.image_tag }}"
            echo "- Trigger: ${GITHUB_EVENT_NAME}"
            echo "- Env file: ${BACKEND_DEPLOY_ENV_FILE}"
            echo "- Dev account seed passwords are not written during production deploy"
          } >> "$GITHUB_STEP_SUMMARY"


      - name: Verify backend health
        if: ${{ env.BACKEND_HEALTH_URL != '' }}
        shell: bash
        run: |
          curl --fail --show-error --silent \
            --retry 12 \
            --retry-delay 5 \
            --retry-all-errors \
            "${BACKEND_HEALTH_URL}"
