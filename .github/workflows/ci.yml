# ===========================================================
# IEMS CI Pipeline
# ===========================================================
# Runs on every push / PR to main:
#   1. Backend lint + tests  (Python 3.12)
#   2. Frontend tests + build (Node 20)
#   3. Docker image build smoke-test
# ===========================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Backend ----
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: iems_test
      JWT_SECRET: ci-test-secret-minimum-32-characters-long

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Validate env templates
        working-directory: .
        run: python backend/scripts/validate_env_examples.py

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8 - architecture guard tests)
        run: flake8 --max-line-length=120 --extend-ignore=E402,E501,W503 tests/test_import_boundaries.py tests/test_outbox_dispatcher_flow.py

      - name: Repository hygiene guards (no legacy artifacts, no removed compat surface)
        run: pytest tests/test_repo_artifact_hygiene.py tests/test_legacy_reference_hygiene.py -q

      - name: Architecture guards (boundaries + outbox flow)
        run: pytest tests/test_import_boundaries.py tests/test_outbox_dispatcher_flow.py -q

      - name: Unit + integration tests
        run: pytest tests/ -x -q --tb=short

  # ---- Frontend tests (sharded across runners for parallelism) ----
  frontend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Tests (shard ${{ matrix.shard }}/3)
        run: npm run test -- --shard=${{ matrix.shard }}/3
        env:
          CI: true

  # ---- Frontend production build smoke ----
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build
        env:
          REACT_APP_BACKEND_URL: http://localhost:8000

  # ---- Docker build smoke-test ----
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend, frontend-build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Build Docker image
        run: docker build -t iems:ci .
