services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be set in deploy/gcp/.env}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: iems_db
      UPLOAD_DIR: /app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  mongo_data:
  uploads_data:
  caddy_data:
  caddy_config:
