name: Boundary Guards

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/boundary-guards.yml"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/boundary-guards.yml"
      - ".github/workflows/ci.yml"

concurrency:
  group: boundary-guards-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-boundary:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backend boundary guard tests
        run: >-
          pytest
          tests/test_import_boundaries.py
          tests/test_context_boundaries.py
          tests/test_context_isolation_whole_repo.py
          tests/test_legacy_reference_hygiene.py
          -q

  frontend-boundary:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Frontend boundary lint
        run: npm run lint

      - name: Frontend boundary tests
        run: >-
          npm run test --
          src/app/router/__tests__/routesImportGuard.test.js
          src/contexts/__tests__/contextBoundary.test.js
        env:
          CI: true
