name: Publish Backend Image

on:
  workflow_dispatch:

concurrency:
  group: publish-backend-image-${{ github.ref }}
  cancel-in-progress: true

env:
  GAR_LOCATION: ${{ vars['GAR_LOCATION'] || 'us-central1' }}
  GAR_REPOSITORY: ${{ vars['GAR_REPOSITORY'] || 'iems' }}
  BACKEND_IMAGE_NAME: ${{ vars['BACKEND_IMAGE_NAME'] || 'myiems-backend' }}
  GCP_PROJECT_ID: ${{ vars['GCP_PROJECT_ID'] }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate publish configuration
        shell: bash
        run: |
          test -n "${GCP_PROJECT_ID}" || { echo "Missing repository variable GCP_PROJECT_ID"; exit 1; }
          test -n "${{ secrets['GCP_WORKLOAD_IDENTITY_PROVIDER'] }}" || { echo "Missing repository secret GCP_WORKLOAD_IDENTITY_PROVIDER"; exit 1; }
          test -n "${{ secrets['GCP_SERVICE_ACCOUNT'] }}" || { echo "Missing repository secret GCP_SERVICE_ACCOUNT"; exit 1; }

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          workload_identity_provider: ${{ secrets['GCP_WORKLOAD_IDENTITY_PROVIDER'] }}
          service_account: ${{ secrets['GCP_SERVICE_ACCOUNT'] }}
          token_format: access_token

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - id: meta
        name: Compute image tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ github.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/gcp/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "## Published backend image"
            echo
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"