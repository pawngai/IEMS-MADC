name: Dependency Audit

on:
  pull_request:
    paths:
      - "backend/requirements-prod.txt"
      - "backend/requirements.txt"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/dependency-audit.yml"
  push:
    branches: [main]
    paths:
      - "backend/requirements-prod.txt"
      - "backend/requirements.txt"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/dependency-audit.yml"

concurrency:
  group: dependency-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-prod.txt

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Audit production Python dependencies
        run: python -m pip_audit -r backend/requirements-prod.txt

  frontend-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit production npm dependencies
        run: npm audit --omit=dev --audit-level=moderate