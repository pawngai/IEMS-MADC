<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="A product of IEMS" />
    <title>IEMS | Fullstack App</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8fafc; font-family: system-ui, sans-serif;">
        <div style="text-align: center; padding: 20px;">
          <div id="iems-spinner" style="width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; margin: 0 auto 16px;"></div>
          <p style="color: #64748b; margin: 0;">Loading IEMS...</p>
        </div>
      </div>
    </div>
    <script>
      (function(){var s=document.createElement('style');s.textContent='@keyframes spin{to{transform:rotate(360deg)}}#iems-spinner{animation:spin 1s linear infinite}';document.head.appendChild(s);})();
    </script>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
