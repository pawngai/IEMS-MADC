# ===========================================================
# IEMS — Docker Compose (development / CI)
# ===========================================================
# Usage:
#   docker compose up --build
#   docker compose down -v   (removes volumes)
# ===========================================================

services:
  # ---- MongoDB ----
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Backend API ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: iems_db
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  # ---- Frontend dev server (optional — for hot-reload) ----
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci --ignore-scripts && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    profiles:
      - dev  # only starts with `docker compose --profile dev up`

volumes:
  mongo_data:
  uploads_data:
  frontend_node_modules:
